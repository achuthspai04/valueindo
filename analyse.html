
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.page{background:#fff;font-family:'Inter',sans-serif;max-width:680px;min-height:520px;display:flex;flex-direction:column}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid #f3f4f6}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#0f0f0f}
.nav-logo span{color:#E8380D}
.body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 64px;text-align:center}
.title{font-family:'Instrument Serif',serif;font-size:26px;color:#0f0f0f;margin-bottom:6px}
.subtitle{font-size:13px;color:#9ca3af;margin-bottom:48px}
.steps{width:100%;max-width:360px;display:flex;flex-direction:column;gap:0}
.step{display:flex;align-items:center;gap:14px;padding:14px 0;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;left:11px;top:44px;width:1px;height:calc(100% - 16px);background:#f3f4f6}
.step-icon{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;position:relative;z-index:1}
.step-icon.done{background:#0f0f0f;color:#fff}
.step-icon.active{background:#E8380D;color:#fff}
.step-icon.pending{background:#f3f4f6;color:#d1d5db}
.step-text{text-align:left}
.step-label{font-size:13px;font-weight:500;color:#0f0f0f}
.step-label.pending{color:#9ca3af;font-weight:400}
.step-sub{font-size:11px;color:#9ca3af;margin-top:2px}
.pulse{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.bar-wrap{width:100%;max-width:360px;height:2px;background:#f3f4f6;border-radius:2px;margin-top:40px;overflow:hidden}
.bar-fill{height:100%;background:#E8380D;border-radius:2px;animation:fill 3.5s ease forwards}
@keyframes fill{0%{width:0%}40%{width:35%}70%{width:65%}90%{width:85%}100%{width:92%}}
</style>

<h2 class="sr-only">Valueindo — analysing screen</h2>

<div class="page">
  <nav class="nav">
    <div class="nav-logo">value<span>indo</span>?</div>
  </nav>

  <div class="body">
    <div class="title">Analysing your offer</div>
    <div class="subtitle">This takes about 10 seconds</div>

    <div class="steps">
      <div class="step">
        <div class="step-icon done"><i class="ti ti-check" aria-hidden="true"></i></div>
        <div class="step-text">
          <div class="step-label">Reading your answers</div>
          <div class="step-sub">6 questions processed</div>
        </div>
      </div>

      <div class="step">
        <div class="step-icon done"><i class="ti ti-check" aria-hidden="true"></i></div>
        <div class="step-text">
          <div class="step-label">Scanning for scam patterns</div>
          <div class="step-sub">Checking against known red flags</div>
        </div>
      </div>

      <div class="step">
        <div class="step-icon active pulse"><i class="ti ti-search" aria-hidden="true"></i></div>
        <div class="step-text">
          <div class="step-label">Researching the company</div>
          <div class="step-sub">Cross-checking offer details</div>
        </div>
      </div>

      <div class="step">
        <div class="step-icon pending"><i class="ti ti-file-analytics" aria-hidden="true"></i></div>
        <div class="step-text">
          <div class="step-label pending">Generating your verdict</div>
        </div>
      </div>

      <div class="step">
        <div class="step-icon pending"><i class="ti ti-shield" aria-hidden="true"></i></div>
        <div class="step-text">
          <div class="step-label pending">Preparing result</div>
        </div>
      </div>
    </div>

    <div class="bar-wrap">
      <div class="bar-fill"></div>
    </div>
  </div>
</div>
